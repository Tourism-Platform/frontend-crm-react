name: Docker Build & Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Раскомментируйте шаги ниже для пуша образа в Docker Registry (например, Docker Hub или GHCR)
      # - name: Login to Docker Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # Поменяйте на true, если включили шаг Login
          tags: my-frontend-app:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_ENABLE_MSW=${{ secrets.VITE_ENABLE_MSW }}
            VITE_APP_ENV=${{ secrets.VITE_APP_ENV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
